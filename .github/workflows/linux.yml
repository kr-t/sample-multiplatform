name: Linux

on:
  workflow_call:
    inputs:
      container-tag:
        description: The container tag to be used
        default: latest
        required: false
        type: string
jobs:
  build-and-run-linux:
    name: Build and Run
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/${{ github.repository }}/ci-container:${{ inputs.container-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure (leaks check)
        run: cmake -B build -S tests/leaks

      - name: Build and run (leaks check)
        working-directory: build
        run: make

      - name: Delete build directory
        run: rm -rf build

      - name: Configure (application)
        run: cmake -B build

      - name: Build (application)
        working-directory: build
        run: make

      - name: Run (application)
        working-directory: build
        run: |
          EXPECTED_LOG="Hello World"
          echo "info: Running the application"
          stdbuf -oL -eL timeout 5s ./main | tee linux_run.log
          echo "info: Checking for expected log"
          if grep -q "$EXPECTED_LOG" linux_run.log; then
            echo "info: Found expected log: $EXPECTED_LOG"
          else
            echo "error: Expected log not found: $EXPECTED_LOG"
            exit 1
          fi
