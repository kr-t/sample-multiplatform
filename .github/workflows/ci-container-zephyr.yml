name: Zephyr ci-container

on:
  workflow_call:
    outputs:
      container-tag:
        value: ${{ jobs.necessary.outputs.container-tag }}

env:
  REGISTRY: ghcr.io

jobs:
  necessary:
    name: Necessary?
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ github.event_name == 'workflow_dispatch' || steps.changed-files.outputs.all_changed_and_modified_files != '' }}
      container-tag: ${{ steps.container-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: changed-files
        with:
          exclude_submodules: true
          files: |
            .devcontainer/Dockerfile.zephyr

      - name: Set container tag
        id: container-tag
        run: |
          if [[ -n "${{ steps.changed-files.outputs.all_changed_and_modified_files }}" ]] && [[ "${{ github.ref }}" != "refs/heads/master" ]]; then
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

  build-push:
    name: Build and push
    timeout-minutes: 300
    if: needs.necessary.outputs.build == 'true'
    needs:
      - necessary
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github Registry
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ github.token }}
          registry: ${{ env.REGISTRY }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile.zephyr
          target: main-ci
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/ci-container-zephyr:${{ needs.necessary.outputs.container-tag }}
